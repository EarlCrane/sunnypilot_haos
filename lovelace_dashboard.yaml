            icon: mdi:gas-station
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_always_on_driver_monitor
            name: Always-on Driver Monitor
            icon: mdi:eye
            tap_action:
              action: toggle
      - type: grid
        cards:
          - type: heading
            heading: Advanced
            icon: mdi:tune
          - type: tile
            entity: switch.sunnypilot_disable_logging
