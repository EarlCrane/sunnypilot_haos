            icon: mdi:camera-control
      - type: grid
        cards:
          - type: heading
            heading: Subaru
            icon: mdi:car-brake-hold
          - type: tile
            entity: switch.sunnypilot_subaru_stop_and_go
            name: Stop and Go
            icon: mdi:car-brake-hold
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_subaru_manual_parking_brake
            name: Manual Parking Brake
            icon: mdi:car-brake-parking
            tap_action:
              action: toggle
          - type: tile
