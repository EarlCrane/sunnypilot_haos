# sunnypilot Lovelace Dashboard
# Uses Home Assistant "sections" views so headings render visually.
# Switches are represented as tile cards with tap_action: toggle.
title: sunnypilot
views:
  - title: Device
    path: device
    icon: mdi:car-connected
    type: sections
    max_columns: 4
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Device
            icon: mdi:car-connected
          - type: tile
            entity: switch.sunnypilot_offroad_mode
            name: Offroad Mode
            icon: mdi:car-off
            tap_action:
              action: toggle
          - type: tile
            entity: select.sunnypilot_device_boot_mode
            name: Device Boot Mode
            icon: mdi:power-settings
          - type: tile
            entity: switch.sunnypilot_metric_units
            name: Metric Units
            icon: mdi:ruler
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_quiet_mode
            name: Quiet Mode
            icon: mdi:volume-off
            tap_action:
              action: toggle
      - type: grid
        cards:
          - type: heading
            heading: Uploads & Recording
            icon: mdi:cloud-upload
          - type: tile
            entity: switch.sunnypilot_onroad_uploads
            name: Onroad Uploads
            icon: mdi:cloud-upload
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_record_front_camera
            name: Record Front Camera
            icon: mdi:camera
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_record_audio
            name: Record Audio
            icon: mdi:microphone
            tap_action:
              action: toggle
      - type: grid
        cards:
          - type: heading
            heading: Network & Power
            icon: mdi:network
          - type: tile
            entity: switch.sunnypilot_gsm_metered
            name: GSM Metered
            icon: mdi:sim
            tap_action:
              action: toggle
          - type: tile
            entity: switch.sunnypilot_gsm_roaming
            name: GSM Roaming
            icon: mdi:sim-alert
            tap_action:
              action: toggle
          - type: tile
            entity: number.sunnypilot_max_time_offroad
            name: Max Time Offroad
            icon: mdi:timer-off

  - title: Toggles
