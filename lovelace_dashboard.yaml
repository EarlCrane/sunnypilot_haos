# sunnypilot Lovelace Dashboard
# Entity IDs are auto-generated by HA as: {platform}.sunnypilot_{name_slug}
# If an entity shows "Entity not found", go to Developer Tools → States to
# find the correct ID and update this file.
title: sunnypilot
views:

  # ── Device Settings ────────────────────────────────────────────────────────
  - title: Device
    path: device
    icon: mdi:car-connected
    cards:
      - type: entities
        title: Device
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_offroad_mode
            name: Offroad Mode
            icon: mdi:car-off
          - entity: select.sunnypilot_device_boot_mode
            name: Device Boot Mode
            icon: mdi:power-settings
          - entity: switch.sunnypilot_metric_units
            name: Metric Units
            icon: mdi:ruler
          - entity: switch.sunnypilot_quiet_mode
            name: Quiet Mode
            icon: mdi:volume-off
      - type: entities
        title: Uploads & Recording
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_onroad_uploads
            name: Onroad Uploads
            icon: mdi:cloud-upload
          - entity: switch.sunnypilot_record_front_camera
            name: Record Front Camera
            icon: mdi:camera
          - entity: switch.sunnypilot_record_audio
            name: Record Audio
            icon: mdi:microphone
      - type: entities
        title: Network
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_gsm_metered
            name: GSM Metered
            icon: mdi:sim
          - entity: switch.sunnypilot_gsm_roaming
            name: GSM Roaming
            icon: mdi:sim-alert
      - type: entities
        title: Power Management
        show_header_toggle: false
        entities:
          - entity: number.sunnypilot_max_time_offroad
            name: Max Time Offroad (min)
            icon: mdi:timer-off

  # ── Toggles ───────────────────────────────────────────────────────────────
  - title: Toggles
    path: toggles
    icon: mdi:toggle-switch
    cards:
      - type: entities
        title: Core
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_openpilot_enabled
            name: openpilot Enabled
            icon: mdi:car-cruise-control
          - entity: select.sunnypilot_driving_personality
            name: Driving Personality
            icon: mdi:speedometer
          - entity: switch.sunnypilot_lane_departure_warning
            name: Lane Departure Warning
            icon: mdi:road-variant
          - entity: switch.sunnypilot_disengage_on_accelerator
            name: Disengage on Accelerator
            icon: mdi:gas-station
          - entity: switch.sunnypilot_always_on_driver_monitor
            name: Always-on Driver Monitor
            icon: mdi:eye
      - type: entities
        title: Advanced
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_disable_logging
            name: Disable Logging
            icon: mdi:database-off
          - entity: switch.sunnypilot_disable_onroad_uploads
            name: Disable Onroad Uploads
            icon: mdi:cloud-off-outline
          - entity: switch.sunnypilot_disable_power_down
            name: Disable Power Down
            icon: mdi:power-plug
          - entity: switch.sunnypilot_disable_updates
            name: Disable Updates
            icon: mdi:update
      - type: entities
        title: Subaru
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_subaru_stop_and_go
            name: Stop and Go
            icon: mdi:car-brake-hold
          - entity: switch.sunnypilot_subaru_manual_parking_brake
            name: Manual Parking Brake
            icon: mdi:car-brake-parking

  # ── Steering ──────────────────────────────────────────────────────────────
  - title: Steering
    path: steering
    icon: mdi:steering
    cards:
      - type: entities
        title: MADS
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_mads_enabled
            name: MADS Enabled
            icon: mdi:steering
          - entity: select.sunnypilot_mads_steering_mode
            name: MADS Steering Mode
            icon: mdi:format-list-bulleted
          - entity: switch.sunnypilot_mads_main_cruise_allowed
            name: MADS Main Cruise Allowed
            icon: mdi:check-circle
          - entity: switch.sunnypilot_mads_unified_engagement
            name: MADS Unified Engagement Mode
            icon: mdi:link
      - type: entities
        title: Torque Tuning
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_enforce_torque_control
            name: Enforce Torque Control
            icon: mdi:wrench
          - entity: select.sunnypilot_torque_control_tune
            name: Torque Control Tune
            icon: mdi:tune
          - entity: switch.sunnypilot_live_torque_self_tune
            name: Self-Tune Enabled
            icon: mdi:chart-line
          - entity: switch.sunnypilot_live_torque_self_tune_relaxed
            name: Self-Tune (Relaxed)
            icon: mdi:chart-line-variant
          - entity: switch.sunnypilot_custom_torque_params
            name: Custom Torque Params
            icon: mdi:cog
          - entity: switch.sunnypilot_torque_override_enabled
            name: Manual Real-Time Tuning
            icon: mdi:tune-vertical
          - entity: number.sunnypilot_lat_accel_factor
            name: Lateral Accel Factor
            icon: mdi:car-speed-limiter
          - entity: number.sunnypilot_friction_override
            name: Friction
            icon: mdi:alpha-f-circle
      - type: entities
        title: Other Settings
        show_header_toggle: false
        entities:
          - entity: number.sunnypilot_min_lateral_speed_blinker
            name: Blinker Min Lateral Speed
            icon: mdi:speedometer-slow
          - entity: switch.sunnypilot_pause_lateral_on_blinker
            name: Blinker Pause Lateral Control
            icon: mdi:arrow-left-right
          - entity: number.sunnypilot_auto_lane_change_timer
            name: Auto Lane Change Timer (s)
            icon: mdi:timer-outline
          - entity: switch.sunnypilot_auto_lane_change_bsm_delay
            name: Auto Lane Change BSM Delay
            icon: mdi:car-side
      - type: entities
        title: Tesla
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_tesla_coop_steering
            name: Tesla Coop Steering
            icon: mdi:car-electric
      - type: entities
        title: HKG Tuning
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_hkg_angle_smoothing
            name: Angle Smoothing
            icon: mdi:chart-bell-curve
          - entity: number.sunnypilot_hkg_overriding_cycles
            name: Overriding Cycles
            icon: mdi:counter
          - entity: number.sunnypilot_hkg_active_torque_reduction
            name: Active Torque Reduction
            icon: mdi:arrow-down-bold
          - entity: number.sunnypilot_hkg_min_torque_reduction
            name: Min Torque Reduction
            icon: mdi:arrow-down
          - entity: number.sunnypilot_hkg_max_torque_reduction
            name: Max Torque Reduction
            icon: mdi:arrow-down-bold-circle
      - type: entities
        title: Advanced
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_neural_network_lateral_control
            name: Neural Network Lateral Control
            icon: mdi:brain

  # ── Cruise ────────────────────────────────────────────────────────────────
  - title: Cruise
    path: cruise
    icon: mdi:speedometer
    cards:
      - type: entities
        title: Longitudinal
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_experimental_mode
            name: Experimental Mode
            icon: mdi:flask
          - entity: switch.sunnypilot_dynamic_experimental_control
            name: Dynamic Experimental Control
            icon: mdi:auto-fix
          - entity: switch.sunnypilot_alpha_longitudinal
            name: Alpha Longitudinal
            icon: mdi:alpha
      - type: entities
        title: Speed Limit Assist
        show_header_toggle: false
        entities:
          - entity: select.sunnypilot_speed_limit_assist_mode
            name: Speed Limit Mode
            icon: mdi:sign-caution
          - entity: select.sunnypilot_speed_limit_source
            name: Speed Limit Source
            icon: mdi:map-marker
          - entity: select.sunnypilot_speed_limit_offset_type
            name: Offset Type
            icon: mdi:plus-minus-variant
          - entity: number.sunnypilot_speed_limit_offset
            name: Offset Value
            icon: mdi:speedometer
      - type: entities
        title: Smart Cruise Control
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_vision_scc
            name: Vision-based SCC
            icon: mdi:eye-outline
          - entity: switch.sunnypilot_map_scc
            name: Map-based SCC
            icon: mdi:map
          - entity: switch.sunnypilot_intelligent_cruise_buttons
            name: Intelligent Button Management
            icon: mdi:button-cursor
      - type: entities
        title: Custom ACC Increments
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_custom_acc_increments
            name: Custom Increments Enabled
            icon: mdi:plus-minus
          - entity: number.sunnypilot_short_press_increment
            name: Short Press Increment
            icon: mdi:skip-next
          - entity: number.sunnypilot_long_press_increment
            name: Long Press Increment
            icon: mdi:fast-forward
      - type: entities
        title: Hyundai
        show_header_toggle: false
        entities:
          - entity: select.sunnypilot_hyundai_longitudinal_tuning
            name: Hyundai Longitudinal Tuning
            icon: mdi:tune

  # ── Developer ─────────────────────────────────────────────────────────────
  - title: Developer
    path: developer
    icon: mdi:code-braces
    cards:
      - type: entities
        title: Access
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_ssh
            name: SSH
            icon: mdi:console
          - entity: switch.sunnypilot_adb
            name: ADB
            icon: mdi:android-debug-bridge
          - entity: switch.sunnypilot_sunnylink_uploader
            name: Sunnylink Uploader
            icon: mdi:cloud-upload-outline
      - type: entities
        title: Controls
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_show_advanced_controls
            name: Show Advanced Controls
            icon: mdi:eye-settings
          - entity: switch.sunnypilot_quick_boot
            name: Quick Boot
            icon: mdi:rocket-launch
          - entity: switch.sunnypilot_enable_copyparty
            name: Copyparty File Server
            icon: mdi:folder-network
          - entity: switch.sunnypilot_joystick_debug_mode
            name: Joystick Debug Mode
            icon: mdi:gamepad-variant
      - type: entities
        title: GitHub Runner
        show_header_toggle: false
        entities:
          - entity: switch.sunnypilot_github_runner
            name: GitHub Runner
            icon: mdi:github
          - entity: switch.sunnypilot_runner_voltage_check
            name: Sufficient Voltage Check
            icon: mdi:battery-check
